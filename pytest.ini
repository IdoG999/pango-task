[pytest]
addopts = -q
testpaths = tests
markers =
    high: high priority test case
    critical: critical severity coverage
    bug_01: coverage for BUG-01
    bug_02: coverage for BUG-02
    bug_03: coverage for BUG-03
    tc_01: coverage for TC-01
    tc_06: coverage for TC-06
    tc_07: coverage for TC-07
    tc_09: coverage for TC-09
